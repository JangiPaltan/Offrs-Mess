<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangi Paltan Officers Mess</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Maratha_Light_Infantry.svg/500px-Maratha_Light_Infantry.svg.png?v=5">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Maratha_Light_Infantry.svg/500px-Maratha_Light_Infantry.svg.png?v=5">
    <link rel="shortcut icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Maratha_Light_Infantry.svg/500px-Maratha_Light_Infantry.svg.png?v=5">
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap">

    <style>
        :root {
            --bg-dark: #0A0F0D; 
            --forest-green: #1B4332; 
            --forest-light: #2D6A4F; 
            --mustard-gold: #E1AD01; 
            --text-white: #FFFFFF;
            --text-muted: #8F9E96;
            --glass-bg: rgba(19, 28, 24, 0.65);
            --glass-border: rgba(225, 173, 1, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            letter-spacing: 1.5px;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #111a15 0%, #0a0f0d 100%);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* SCROLLABLE MAIN CONTAINER */
        .page-container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: space-between;
        }

        /* GLASSMORPHISM LOCK SCREEN */
        #lock-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            background: rgba(10, 15, 13, 0.6);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
            overflow-y: auto;
            padding: 20px 0;
        }

        .pin-dots {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border: 2px solid var(--forest-light);
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .dot.active {
            background-color: var(--mustard-gold);
            border-color: var(--mustard-gold);
            box-shadow: 0 0 12px var(--mustard-gold);
            transform: scale(1.2);
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 85px);
            gap: 15px;
            margin-bottom: 20px;
        }

        .key {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 1px solid rgba(225, 173, 1, 0.15);
            background: rgba(27, 67, 50, 0.2);
            backdrop-filter: blur(5px);
            color: var(--text-white);
            font-size: 1.5rem;
            font-weight: 300;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.1s, transform 0.1s;
        }

        .key:active {
            background-color: var(--mustard-gold);
            color: var(--bg-dark);
            transform: scale(0.92);
        }

        /* UI HEADERS */
        header {
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
        }

        .logo-img {
            width: 90px;
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }

        header h1 {
            color: var(--mustard-gold);
            font-family: 'Cinzel', Georgia, serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: none; 
            padding-bottom: 12px;
            border-bottom: 1px solid var(--forest-green);
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        /* LIVE SYSTEM CLOCK */
        .live-clock {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        #live-date {
            font-size: 1.1rem;
            letter-spacing: 2px;
            font-weight: 500;
            color: var(--text-white);
        }

        #live-time {
            font-size: 1rem;
            letter-spacing: 3px;
            font-weight: 400;
            color: var(--text-muted);
        }

        /* CONSOLE ACTION GRID */
        .grid-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            margin: 30px 0;
        }

        /* GLASSMORPHISM BUTTONS & SHIMMER PULSE DYNAMICS */
        .btn-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 8px; 
            padding: 26px 15px;
            text-align: center;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), border-color 0.3s, box-shadow 0.3s;
        }

        @keyframes subtleGlow {
            0% { border-color: rgba(225, 173, 1, 0.25); }
            50% { border-color: rgba(225, 173, 1, 0.5); }
            100% { border-color: rgba(225, 173, 1, 0.25); }
        }

        .btn-card {
            animation: subtleGlow 4s infinite ease-in-out;
        }

        .btn-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.08), transparent);
            transform: skewX(-25deg);
            transition: 0.75s;
        }

        .btn-card:hover::before {
            left: 150%;
        }

        .btn-card:active {
            transform: scale(0.97) translateY(2px);
            background: var(--mustard-gold);
            border-color: var(--mustard-gold);
            box-shadow: 0 2px 8px rgba(225, 173, 1, 0.4);
            transition: background 0.05s, transform 0.05s;
        }

        .btn-card h2 {
            color: var(--mustard-gold);
            font-size: 1.3rem;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color 0.05s, transform 0.2s;
        }

        .btn-card:active h2 {
            color: var(--bg-dark); 
            transform: scale(0.98);
        }

        /* INTERFACE STAGE ANIMATION */
        #app-screen {
            opacity: 0; 
            transform: translateY(20px) scale(0.98); 
            width: 100%;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
        }

        .admin-section {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 20px;
        }

        .btn-admin {
            background-color: transparent;
            border: 1px dashed var(--text-muted);
            color: var(--text-muted);
            padding: 12px 40px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-admin:hover, .btn-admin:active {
            border-color: var(--text-white);
            color: var(--text-white);
            background-color: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <header style="margin-bottom: 45px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Maratha_Light_Infantry.svg/500px-Maratha_Light_Infantry.svg.png" class="logo-img" alt="Logo">
            <h1>Jangi Paltan Officers Mess</h1>
        </header>
        <div class="pin-dots">
            <div class="dot" id="dot1"></div>
            <div class="dot" id="dot2"></div>
            <div class="dot" id="dot3"></div>
            <div class="dot" id="dot4"></div>
        </div>
        <div class="keypad">
            <div class="key" onclick="pressNum(1)">1</div>
            <div class="key" onclick="pressNum(2)">2</div>
            <div class="key" onclick="pressNum(3)">3</div>
            <div class="key" onclick="pressNum(4)">4</div>
            <div class="key" onclick="pressNum(5)">5</div>
            <div class="key" onclick="pressNum(6)">6</div>
            <div class="key" onclick="pressNum(7)">7</div>
            <div class="key" onclick="pressNum(8)">8</div>
            <div class="key" onclick="pressNum(9)">9</div>
            <div class="key" style="font-size: 0.75rem;" onclick="clearPin()">CLEAR</div>
            <div class="key" onclick="pressNum(0)">0</div>
            <div class="key" style="font-size: 0.75rem;" onclick="lockApp()">LOCK</div>
        </div>
    </div>

    <div class="page-container">
        <div id="app-screen">
            <header>
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Maratha_Light_Infantry.svg/500px-Maratha_Light_Infantry.svg.png" class="logo-img" alt="Logo">
                <h1>Jangi Paltan Officers Mess</h1>
                
                <div class="live-clock">
                    <span id="live-date"></span>
                    <span id="live-time"></span>
                </div>
            </header>

           <div class="grid-container">
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSdEil3Mo3jSFAq-xCCXpXXc4o7bwY3PFu9A7oDMNgqHW_2Kxw/viewform?usp=sharing&ouid=117721681857450201406" target="_self" class="btn-card">
                    <h2>Liquor</h2>
                </a>
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSeToMjA5N-vvYkbslGoyck9SmsrSdGbNIIm2j6Lbln8sbJ2dw/viewform?usp=sharing&ouid=117721681857450201406" target="_self" class="btn-card">
                    <h2>Soft Drinks</h2>
                </a>
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSek-_3zzJTKczyOz2T3m4qDOtOt_sh2KcnK2_t7nXP5dAD8yQ/viewform?usp=sharing&ouid=117721681857450201406" target="_self" class="btn-card">
                    <h2>Guest Room</h2>
                </a>
               <a href="https://docs.google.com/forms/d/e/1FAIpQLSdr05sZYlhqm4c0fBBZnUdQ7oOCZHj99BErHVKFA_Ovu9GMHQ/viewform?usp=sharing&ouid=117721681857450201406" target="_self" class="btn-card">
                    <h2>Free Liquor</h2>
                </a>
            </div>

            <div class="admin-section">
                <a href="https://docs.google.com/spreadsheets/d/17rMvMusueD6IDAYGIjPvL9662G-z4z-CRSc_1jJrRaY/edit?gid=1634296846#gid=1634296846" target="_self" class="btn-admin">
                    Mess Ledger
                </a>
            </div>
        </div>
    </div>

    <script>
        const CORRECT_PIN = "1768";
        let currentPin = "";
        let idleTimer;

        // AUTOMATIC PAGE RESET ENGINE (2 Minute Expiration)
        function resetIdleTimer() {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(function() {
                lockApp();
            }, 120000); 
        }

        window.onload = resetIdleTimer;
        window.onmousemove = resetIdleTimer;
        window.onmousedown = resetIdleTimer;
        window.ontouchstart = resetIdleTimer;
        window.onclick = resetIdleTimer;
        window.onkeydown = resetIdleTimer;

        // Keypad Controller Logic
        function pressNum(num) {
            resetIdleTimer();
            if (currentPin.length < 4) {
                currentPin += num;
                updateDots();
                if (currentPin.length === 4) {
                    setTimeout(verifyPin, 150);
                }
            }
        }

        function clearPin() {
            resetIdleTimer();
            currentPin = "";
            updateDots();
        }

        function updateDots() {
            for (let i = 1; i <= 4; i++) {
                const dot = document.getElementById(`dot${i}`);
                if (i <= currentPin.length) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            }
        }

        // SMOOTH SLIDE PAGE TRANSITION
        function verifyPin() {
            if (currentPin === CORRECT_PIN) {
                document.getElementById('lock-screen').style.transform = 'translateY(-100%)';
                document.getElementById('lock-screen').style.opacity = '0';
                
                document.getElementById('app-screen').style.opacity = '1';
                document.getElementById('app-screen').style.transform = 'translateY(0) scale(1)';
                clearPin();
                resetIdleTimer();
            } else {
                alert("ACCESS DENIED. INCORRECT PIN.");
                clearPin();
            }
        }

        function lockApp() {
            document.getElementById('lock-screen').style.transform = 'translateY(0)';
            document.getElementById('lock-screen').style.opacity = '1';
            
            document.getElementById('app-screen').style.opacity = '0';
            document.getElementById('app-screen').style.transform = 'translateY(20px) scale(0.98)';
            clearPin();
        }

        // Clock Script
        function updateDateTime() {
            const now = new Date();

            const day = now.getDate();
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const month = months[now.getMonth()];
            const year = now.getFullYear();
            
            document.getElementById('live-date').innerText = `${day} ${month} ${year}`;

            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('live-time').innerText = `${hours}:${minutes}:${seconds}`;
        }

        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
