<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangi Paltan Officers' Mess</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Custom Home Screen Icons -->
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Maratha_Light_Infantry.svg/500px-Maratha_Light_Infantry.svg.png">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Maratha_Light_Infantry.svg/500px-Maratha_Light_Infantry.svg.png">
    
    <!-- Elegant Serif Web Font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap">

    <style>
        :root {
            --bg-dark: #0A0F0D; 
            --forest-green: #1B4332; 
            --forest-light: #2D6A4F; 
            --mustard-gold: #E1AD01; 
            --text-white: #FFFFFF;
            --text-muted: #8F9E96;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            letter-spacing: 1.5px;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* LOCK SCREEN */
        #lock-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: absolute;
            z-index: 10;
            background: linear-gradient(135deg, #070B09 0%, #111A16 100%);
            transition: transform 0.5s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .pin-dots {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border: 2px solid var(--forest-light);
            border-radius: 50%;
            transition: all 0.15s ease;
        }

        .dot.active {
            background-color: var(--text-white);
            border-color: var(--text-white);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 85px);
            gap: 15px;
        }

        .key {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(27, 67, 50, 0.15);
            color: var(--text-white);
            font-size: 1.5rem;
            font-weight: 300;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.1s;
        }

        .key:active {
            background-color: var(--forest-green);
            border-color: var(--forest-light);
        }

        /* MAIN APP SCREEN */
        #app-screen {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 600px;
            height: 100%;
            padding: 30px 20px;
            justify-content: space-between;
            opacity: 0;
            transform: scale(0.98);
            transition: all 0.4s ease;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        .logo-img {
            width: 90px;
            height: auto;
            margin-bottom: 10px;
        }

        header h1 {
            color: var(--mustard-gold);
            font-family: 'Cinzel', Georgia, serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: none; /* Keeps first letter capitalization matching source text */
            padding-bottom: 8px;
            border-bottom: 1px solid var(--forest-green);
        }

        /* LIVE CLOCK DISPLAY */
        .live-clock {
            margin-top: 10px;
            font-size: 1rem;
            letter-spacing: 2px;
            font-weight: 400;
            color: var(--text-white);
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        /* VERTICAL STACK CONTAINER */
        .grid-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            margin: 20px 0;
        }

        .btn-card {
            background-color: #0F1613; 
            border: 1px solid var(--forest-green);
            border-radius: 4px; 
            padding: 22px 15px;
            text-align: center;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-card:active {
            background-color: var(--forest-green);
            border-color: var(--forest-light);
        }

        .btn-card h2 {
            color: var(--mustard-gold);
            font-size: 1.3rem;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .admin-section {
            display: flex;
            justify-content: center;
        }

        .btn-admin {
            background-color: transparent;
            border: 1px dashed var(--text-muted);
            color: var(--text-muted);
            padding: 12px 40px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-admin:active {
            border-color: var(--text-white);
            color: var(--text-white);
            background-color: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <!-- PIN LOCK SCREEN -->
    <div id="lock-screen">
        <header style="margin-bottom: 40px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Maratha_Light_Infantry.svg/500px-Maratha_Light_Infantry.svg.png" class="logo-img" alt="Logo">
            <h1 style="border: none; padding: 0; font-size: 1.5rem; color: var(--text-white); font-family: -apple-system, sans-serif; text-transform: uppercase;">JANGI PALTAN MESS</h1>
            <p style="text-align: center; color: var(--text-muted); text-transform: uppercase; font-size: 0.8rem; margin-top: 5px;">ENTER BAR SYSTEM PIN</p>
        </header>
        <div class="pin-dots">
            <div class="dot" id="dot1"></div>
            <div class="dot" id="dot2"></div>
            <div class="dot" id="dot3"></div>
            <div class="dot" id="dot4"></div>
        </div>
        <div class="keypad">
            <div class="key" onclick="pressNum(1)">1</div>
            <div class="key" onclick="pressNum(2)">2</div>
            <div class="key" onclick="pressNum(3)">3</div>
            <div class="key" onclick="pressNum(4)">4</div>
            <div class="key" onclick="pressNum(5)">5</div>
            <div class="key" onclick="pressNum(6)">6</div>
            <div class="key" onclick="pressNum(7)">7</div>
            <div class="key" onclick="pressNum(8)">8</div>
            <div class="key" onclick="pressNum(9)">9</div>
            <div class="key" style="font-size: 0.75rem;" onclick="clearPin()">CLEAR</div>
            <div class="key" onclick="pressNum(0)">0</div>
            <div class="key" style="font-size: 0.75rem;" onclick="lockApp()">LOCK</div>
        </div>
    </div>

    <!-- MAIN CONTROL SCREEN -->
    <div id="app-screen">
        <header>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Maratha_Light_Infantry.svg/500px-Maratha_Light_Infantry.svg.png" class="logo-img" alt="Logo">
            <h1>Jangi Paltan Officers Mess</h1>
            
            <!-- Dynamic Date/Time Section -->
            <div class="live-clock">
                <span id="live-date"></span>
                <span id="live-time"></span>
            </div>
        </header>

        <div class="grid-container">
            <!-- REPLACE THE PLACEHOLDER LINKS BELOW WITH YOUR GOOGLE FORM LINKS -->
            <a href="https://docs.google.com/forms/d/1mA4IOfRN7vVriV3cV0UuDfQGUY9_c6uPWNBEcOK2r0Y/edit" target="_blank" class="btn-card">
                <h2>Liquor</h2>
            </a>
            <a href="https://docs.google.com/forms/d/1BGP0SiCkCkTGzT2nydH4QbMSZOKdqasuNi56AayaHQc/edit" target="_blank" class="btn-card">
                <h2>Soft Drinks</h2>
            </a>
            <a href="https://docs.google.com/forms/d/1vw1QQm38X_oqbCNVeRceQ-ujsZ60CxCkC7acQSH5qio/edit" target="_blank" class="btn-card">
                <h2>Guest Room</h2>
            </a>
        </div>

        <div class="admin-section">
            <!-- REPLACE THE PLACEHOLDER LINK BELOW WITH YOUR MASTER SHEET URL -->
            <a href="https://docs.google.com/spreadsheets/d/17rMvMusueD6IDAYGIjPvL9662G-z4z-CRSc_1jJrRaY/edit?gid=1634296846#gid=1634296846
" target="_blank" class="btn-admin">
                Mess Ledger
            </a>
        </div>
    </div>

    <script>
        const CORRECT_PIN = "1768";
        let currentPin = "";

        // PIN Functionality
        function pressNum(num) {
            if (currentPin.length < 4) {
                currentPin += num;
                updateDots();
                if (currentPin.length === 4) {
                    setTimeout(verifyPin, 150);
                }
            }
        }

        function clearPin() {
            currentPin = "";
            updateDots();
        }

        function updateDots() {
            for (let i = 1; i <= 4; i++) {
                const dot = document.getElementById(`dot${i}`);
                if (i <= currentPin.length) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            }
        }

        function verifyPin() {
            if (currentPin === CORRECT_PIN) {
                document.getElementById('lock-screen').style.transform = 'translateY(-100%)';
                document.getElementById('app-screen').style.opacity = '1';
                document.getElementById('app-screen').style.transform = 'scale(1)';
                clearPin();
            } else {
                alert("ACCESS DENIED. INCORRECT PIN.");
                clearPin();
            }
        }

        function lockApp() {
            document.getElementById('lock-screen').style.transform = 'translateY(0)';
            document.getElementById('app-screen').style.opacity = '0';
            document.getElementById('app-screen').style.transform = 'scale(0.98)';
            clearPin();
        }

        // Real-Time Dynamic Date & Time Script
        function updateDateTime() {
            const now = new Date();

            // Format Date: 14 July 2026
            const day = now.getDate();
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const month = months[now.getMonth()];
            const year = now.getFullYear();
            
            document.getElementById('live-date').innerText = `${day} ${month} ${year}`;

            // Format Time: HHMMSS (24-Hour Format)
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('live-time').innerText = `${hours}${minutes}${seconds}`;
        }

        // Run immediately and update every 1 second
        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
